name: Build & Release
on:
  push:
    tags:
      # https://semver.org/#spec-item-2
      - "v[0-9]+.[0-9]+.[0-9]+"
      # https://semver.org/#spec-item-9
      - "v[0-9]+.[0-9]+.[0-9]+-beta.rc[0-9]+"
    branches:
      - "main"
      - "develop"
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
      - name: Validate the changelog
        uses: release-flow/keep-a-changelog-action@74931dec7ecdbfc8e38ac9ae7e8dd84c08db2f32 # v3.0.0
        with:
          command: query
          version: latest-or-unreleased
  build-docker-image:
    name: Build Docker image for ${{ github.ref_name }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      security-events: write
    needs:
      - lint
    steps:
      - name: Set ghcr repository name
        id: set-ghcr-repository
        run: |
          ghcr_name=$(echo "${{ github.repository }}" | awk '{ print tolower($0) }')
          echo "ghcr-repository=${ghcr_name}" >> $GITHUB_OUTPUT
      - name: Gather Docker metadata
        id: docker-meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: |
            ghcr.io/${{ steps.set-ghcr-repository.outputs.ghcr-repository }}
          tags: |
            # Tag branches with branch name
            type=ref,event=branch
            # For a tag x.y.z or vX.Y.Z, output an x.y.z and x.y image tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: all
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        if: github.ref_type == 'tag'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref_type == 'tag' }}
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
  scan-docker-image:
    name: Scan Docker image for ${{ github.ref_name }}
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
    needs:
      - lint
    steps:
      - name: Set ghcr repository name
        id: set-ghcr-repository
        run: |
          ghcr_name=$(echo "${{ github.repository }}" | awk '{ print tolower($0) }')
          echo "ghcr-repository=${ghcr_name}" >> $GITHUB_OUTPUT
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ steps.set-ghcr-repository.outputs.ghcr-repository }}
          load: true
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: ghcr.io/${{ steps.set-ghcr-repository.outputs.ghcr-repository }}
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "0"
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: "trivy-results.sarif"
  release:
    name: Build Docker image for ${{ github.ref_name }}
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    needs:
      - build-docker-image
      - scan-docker-image
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Get latest release info
        id: query-release-info
        uses: release-flow/keep-a-changelog-action@74931dec7ecdbfc8e38ac9ae7e8dd84c08db2f32 # v3.0.0
        with:
          command: query
          version: ${{ github.ref_name }}
      - name: Display release info
        env:
          VERSION: ${{ steps.query-release-info.outputs.version }}
          RELEASE_DATE: ${{ steps.query-release-info.outputs.release-date }}
          RELEASE_NOTES: ${{ steps.query-release-info.outputs.release-notes }}
        run: |
          echo "Version: ${VERSION}"
          echo "Date: ${RELEASE_DATE}"
          echo "${RELEASE_NOTES}"
      - name: Create GitHub release
        env:
          RELEASE_NOTES: ${{ steps.query-release-info.outputs.release-notes }}
          RELEASE_TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes "${RELEASE_NOTES}"
