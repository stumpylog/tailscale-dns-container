version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: develop
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: develop
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
